version: '3.9'

# ─── Use this ONCE to get your SSL certificates, then switch to docker-compose.yml ───
# Run: docker compose -f docker-compose.certbot.yml up
# After certs appear in ./nginx/certs/, use the main docker-compose.yml

services:
  certbot:
    image: certbot/certbot:latest
    container_name: the_saveur_certbot
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - ./nginx/certbot-webroot:/var/www/certbot
    # Replace YOUR_DOMAIN.com and YOUR_EMAIL with real values
    command: certonly --webroot --webroot-path=/var/www/certbot
             --email YOUR_EMAIL@gmail.com
             --agree-tos --no-eff-email
             -d YOUR_DOMAIN.com -d www.YOUR_DOMAIN.com

  nginx_temp:
    image: nginx:alpine
    container_name: the_saveur_nginx_temp

    ports:
      - "80:80"
    volumes:
      - ./nginx/certbot-webroot:/var/www/certbot
      - ./nginx/nginx_temp.conf:/etc/nginx/conf.d/default.conf
