# ── LOCAL DEVELOPMENT override ─────────────────────────────────────────────
# Use this on your Windows PC to test Docker locally (no SSL needed)
# Run: docker compose -f docker-compose.yml -f docker-compose.local.yml up --build

services:
  web:
    environment:
      - FLASK_DEBUG=true
      - DATA_DIR=/app/data

  nginx:
    volumes:
      - ./nginx/nginx_local.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro
    # Override to remove the certs volume (not needed locally)
    # The nginx_local.conf handles HTTP-only
