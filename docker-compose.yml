services:
  # ── Flask App (Gunicorn) ──────────────────────────────────────────────────
  web:
    build: .
    image: the_saveur_web:latest
    container_name: the_saveur_app
    restart: always

    env_file:
      - .env
    volumes:
      - sqlite_data:/app/data        # Persistent database storage
      - ./static:/app/static         # Static files
    expose:
      - "8000"
    networks:
      - saveur_net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Nginx (Reverse Proxy) ────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: the_saveur_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      # Default: HTTP only (works everywhere, no SSL certs needed)
      # On production, override this with docker-compose.prod.yml
      - ./nginx/nginx_local.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      - saveur_net

volumes:
  sqlite_data:

networks:
  saveur_net:
    driver: bridge
