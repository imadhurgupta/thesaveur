# ── PRODUCTION override — adds HTTPS/SSL to Nginx ──────────────────────────
# Run on your VPS AFTER getting SSL certs:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro    # SSL config
      - ./nginx/certs:/etc/nginx/certs:ro                       # Let's Encrypt certs
      - ./static:/app/static:ro
