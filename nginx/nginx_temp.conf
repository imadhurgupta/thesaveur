# Temporary Nginx config used ONLY during Certbot SSL certificate generation
# After certs are obtained, this is no longer needed

server {
    listen 80;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'Certbot challenge server - please wait...';
        add_header Content-Type text/plain;
    }
}
