# LOCAL DEVELOPMENT Nginx config — HTTP only, no SSL needed
# Used when running docker-compose up locally on Windows
# On production server, nginx.conf (with SSL) is used automatically

upstream flask_app {
    server web:8000;
}

server {
    listen 80;
    server_name localhost 127.0.0.1;

    # Serve static files directly (bypasses Flask for speed)
    location /static {
        alias /app/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy all other requests to Flask/Gunicorn
    location / {
        proxy_pass http://flask_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        client_max_body_size 16M;
    }
}
